<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catastro de Grifos — Singemelec / Sacyr Aguas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16323A;
  --ink-2:#1F4350;
  --concrete:#EDE7DC;
  --concrete-2:#F7F4ED;
  --paper:#FFFFFF;
  --hidrante:#C8334D;
  --senal:#E2A33D;
  --tuberia:#3B6E8F;
  --musgo:#5C8A60;
  --line:#D9D2C2;
  --text:#1B2A2E;
  --text-soft:#5C6B6E;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--concrete);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.02em;}
.mono{font-family:'IBM Plex Mono',monospace;}
#app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header.topbar{
  background:var(--ink);
  color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;height:64px;flex-shrink:0;
  border-bottom:3px solid var(--senal);
}
.brand{display:flex;align-items:center;gap:14px;}
.brand .mark{
  width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--hidrante), #8c1f33 80%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-weight:700;color:#fff;font-size:14px;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.25);
}
.brand .name{font-family:'Oswald',sans-serif;font-size:17px;letter-spacing:.04em;line-height:1.1;}
.brand .name small{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#9fb3b9;text-transform:none;letter-spacing:.02em;}
.role-switch{display:flex;align-items:center;gap:10px;}
.role-pill{
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;
  padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.06);color:#cfe3e7;cursor:pointer;transition:.15s;
}
.role-pill.active{background:var(--senal);color:#231a02;border-color:var(--senal);font-weight:600;}

/* LAYOUT */
.body-grid{display:flex;flex:1;min-height:0;}
nav.rail{
  width:190px;background:var(--ink-2);color:#dfe9eb;flex-shrink:0;
  padding:18px 0;display:flex;flex-direction:column;gap:2px;
}
nav.rail button{
  all:unset;cursor:pointer;padding:13px 22px;font-family:'IBM Plex Sans',sans-serif;
  font-size:13.5px;font-weight:500;color:#bcd0d4;border-left:3px solid transparent;
}
nav.rail button:hover{background:rgba(255,255,255,.05);color:#fff;}
nav.rail button.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--senal);}
nav.rail .rail-foot{margin-top:auto;padding:14px 22px;font-size:10.5px;color:#7d979b;font-family:'IBM Plex Mono',monospace;line-height:1.5;}

main{flex:1;overflow-y:auto;padding:24px 28px 60px;}
.page{max-width:1300px;margin:0 auto;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-head h1{font-size:24px;margin:0;color:var(--ink);}
.page-head p{margin:2px 0 0;color:var(--text-soft);font-size:13px;}

/* CARDS / KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.kpi .tab{position:absolute;left:0;top:0;bottom:0;width:5px;}
.kpi .num{font-family:'Oswald',sans-serif;font-size:30px;line-height:1;color:var(--ink);}
.kpi .lbl{font-size:11.5px;color:var(--text-soft);margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}

.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:18px;}
.panel h3{font-size:14px;margin:0 0 12px;color:var(--ink);}
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}
@media(max-width:980px){.grid-2{grid-template-columns:1fr;}}

#dashMap{height:430px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
.chart-wrap{position:relative;height:200px;margin-bottom:10px;}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--text-soft);}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:820px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:12px;font-weight:600;color:var(--ink);text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select,.field textarea{
  font-family:'IBM Plex Sans',sans-serif;padding:9px 11px;border:1px solid var(--line);
  border-radius:6px;font-size:13.5px;background:#fff;color:var(--text);
}
.field textarea{resize:vertical;min-height:70px;}
.field small{color:var(--text-soft);font-size:11px;}
.btn{
  font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13px;
  padding:10px 18px;border-radius:7px;border:none;cursor:pointer;transition:.15s;
}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:var(--ink-2);}
.btn-amber{background:var(--senal);color:#241a01;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn[disabled]{opacity:.5;cursor:not-allowed;}

.geo-map-mini{height:240px;border-radius:8px;border:1px solid var(--line);margin-top:6px;}
.photo-box{
  border:1.5px dashed var(--line);border-radius:8px;padding:10px;text-align:center;
  background:var(--concrete-2);cursor:pointer;position:relative;min-height:140px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
}
.photo-box img{max-width:100%;max-height:160px;border-radius:6px;}
.photo-box span{font-size:11.5px;color:var(--text-soft);}
.priority-opts{display:flex;gap:8px;}
.priority-opts label{flex:1;}
.priority-opts input{display:none;}
.priority-opts .opt{
  display:block;text-align:center;padding:9px 6px;border-radius:7px;border:2px solid var(--line);
  font-size:12px;font-weight:600;cursor:pointer;color:var(--text-soft);background:#fff;
}
.priority-opts input:checked + .opt.inmediato{border-color:var(--hidrante);background:#fdecef;color:var(--hidrante);}
.priority-opts input:checked + .opt.corto{border-color:var(--senal);background:#fdf3e1;color:#8a6109;}
.priority-opts input:checked + .opt.mediano{border-color:var(--tuberia);background:#e9f1f5;color:var(--tuberia);}

/* LIST */
.findings-list{display:flex;flex-direction:column;gap:10px;}
.fcard{display:flex;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.fcard .tag{width:7px;flex-shrink:0;}
.fcard .fbody{padding:13px 16px;flex:1;}
.fcard .frow1{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
.fcard .fid{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-soft);}
.fcard .faddr{font-weight:600;font-size:14.5px;color:var(--ink);}
.fcard .fmeta{font-size:11.5px;color:var(--text-soft);margin-top:3px;}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:14px;text-transform:uppercase;letter-spacing:.03em;}
.badge.inmediato{background:#fdecef;color:var(--hidrante);}
.badge.corto{background:#fdf3e1;color:#8a6109;}
.badge.mediano{background:#e9f1f5;color:var(--tuberia);}
.badge.pendiente{background:#f1eee6;color:#7a7263;}
.badge.en_proceso{background:#eaf1ec;color:#3f6e46;}
.badge.resuelto{background:#e3f0e4;color:var(--musgo);}
.fcard .factions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.empty{padding:40px 20px;text-align:center;color:var(--text-soft);}
.empty .display{font-size:18px;color:var(--ink);margin-bottom:6px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(22,50,58,.55);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 24px;}
.modal h2{font-size:19px;margin:0 0 4px;color:var(--ink);}
.modal .closeX{float:right;cursor:pointer;font-size:20px;color:var(--text-soft);background:none;border:none;}
.detail-imgs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
.detail-imgs figure{margin:0;}
.detail-imgs img{width:100%;border-radius:8px;border:1px solid var(--line);}
.detail-imgs figcaption{font-size:11px;color:var(--text-soft);margin-top:4px;}
#detailMap{height:220px;border-radius:8px;border:1px solid var(--line);margin:10px 0;}
.comment{background:var(--concrete-2);border-radius:8px;padding:9px 11px;margin-bottom:8px;font-size:13px;}
.comment .ca{font-size:11px;color:var(--text-soft);font-family:'IBM Plex Mono',monospace;margin-bottom:3px;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:2000;opacity:0;transform:translateY(10px);transition:.25s;}
.toast.show{opacity:1;transform:translateY(0);}

.loading{padding:40px;text-align:center;color:var(--text-soft);}

/* ---------------- MOBILE ---------------- */
@media(max-width:720px){
  header.topbar{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px;}
  .brand .name{font-size:14px;}
  .role-switch{width:100%;justify-content:flex-end;}
  .body-grid{flex-direction:column;}
  nav.rail{
    width:100%;flex-direction:row;overflow-x:auto;padding:6px 10px;gap:4px;
    border-bottom:1px solid rgba(255,255,255,.1);
  }
  nav.rail button{padding:9px 14px;white-space:nowrap;border-left:none;border-bottom:3px solid transparent;}
  nav.rail button.active{border-left-color:transparent;border-bottom-color:var(--senal);}
  nav.rail .rail-foot{display:none;}
  main{padding:14px 12px 50px;}
  .page-head h1{font-size:19px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .kpi .num{font-size:24px;}
  #dashMap{height:280px;}
  .form-grid{grid-template-columns:1fr;}
  .detail-imgs{grid-template-columns:1fr;}
  .modal{padding:16px;max-height:92vh;}
  .fcard .frow1{flex-direction:column;align-items:flex-start;gap:4px;}
}
</style>
</head>
<body>
<div id="lockScreen" style="position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:5000;padding:20px;">
  <div style="background:#fff;border-radius:14px;padding:36px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);">
    <!-- Logo -->
    <div style="width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #C8334D, #8c1f33 80%);margin:0 auto 14px;box-shadow:inset 0 0 0 3px rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    </div>
    <h2 style="font-family:'Oswald',sans-serif;text-transform:uppercase;margin:0 0 4px;font-size:19px;color:#16323A;letter-spacing:.03em;">Catastro de Grifos</h2>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#E2A33D;text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px;">Singemelec · Sacyr Aguas</p>
    <p style="font-size:12.5px;color:#5C6B6E;margin:0 0 22px;line-height:1.5;">Ingresa tu usuario y contraseña<br>para acceder al aplicativo.</p>

    <!-- Campo Usuario -->
    <div style="text-align:left;margin-bottom:12px;">
      <label style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#16323A;display:block;margin-bottom:5px;">Usuario</label>
      <select id="loginUsuario" style="width:100%;padding:10px 12px;border:1.5px solid #D9D2C2;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Sans',sans-serif;background:#fff;color:#1B2A2E;box-sizing:border-box;appearance:none;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22><path fill=%22%235C6B6E%22 d=%22M6 8L1 3h10z%22/></svg>');background-repeat:no-repeat;background-position:right 12px center;">
        <option value="">— Selecciona tu empresa —</option>
        <option value="singemelec">SINGEMELEC</option>
        <option value="sacyr">SACYR AGUAS</option>
      </select>
    </div>

    <!-- Campo Contraseña -->
    <div style="text-align:left;margin-bottom:16px;">
      <label style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#16323A;display:block;margin-bottom:5px;">Contraseña</label>
      <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña"
        style="width:100%;padding:10px 12px;border:1.5px solid #D9D2C2;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Sans',sans-serif;color:#1B2A2E;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') verificarAcceso();">
    </div>

    <button style="width:100%;font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13.5px;padding:12px 18px;border-radius:7px;border:none;cursor:pointer;background:#16323A;color:#fff;letter-spacing:.03em;" onclick="verificarAcceso()">
      Ingresar
    </button>
    <div id="accessError" style="color:#C8334D;font-size:12px;margin-top:10px;display:none;font-family:'IBM Plex Sans',sans-serif;">
      Usuario o contraseña incorrectos. Intenta nuevamente.
    </div>
  </div>
</div>
<script>
/* ====================================================================
   CONFIGURACIÓN DE FIREBASE
   Pega aquí los datos del proyecto (Consola de Firebase →
   Configuración del proyecto → Tus apps → SDK y configuración).
   Mientras diga "TU_API_KEY" la app funciona en MODO LOCAL:
   los datos quedan solo en este dispositivo y no se comparten.
   ==================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyBjQnYsItnYmEUF6QzB7cMdgcKcgv83oiU",
  authDomain: "catastro-grifos.firebaseapp.com",
  projectId: "catastro-grifos",
  storageBucket: "catastro-grifos.firebasestorage.app",
  messagingSenderId: "749197741360",
  appId: "1:749197741360:web:74bfc18e6aaa27adb3ccf5"
};

/* Correos de acceso creados en Firebase → Authentication → Users.
   La contraseña NO vive en el código: la administra Firebase. */
const USUARIOS = {
  "singemelec": { email: "singemelec@catastrogrifos.cl", rol: "singemelec" },
  "sacyr":      { email: "sacyr@catastrogrifos.cl",      rol: "sacyr" }
};

/* Respaldo solo para modo local (Firebase sin configurar) */
const CREDENCIALES_LOCAL = {
  "singemelec": { pass: "SINGEMELEC2026", rol: "singemelec" },
  "sacyr":      { pass: "SACYR2026",      rol: "sacyr" }
};

let STORAGE_MODE = 'local';
let firebaseReady = false;
let db = null, auth = null;
let SESION_PENDIENTE = null;

function initFirebase(){
  try{
    if(!firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf('TU_API_KEY') > -1) throw new Error('sin-configurar');
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    firebaseReady = true;
    STORAGE_MODE = 'remote';
  }catch(e){
    firebaseReady = false;
    STORAGE_MODE = 'local';
  }
}
initFirebase();

function abrirApp(rol){
  localStorage.setItem('grifos_role', rol);
  const lock = document.getElementById('lockScreen');
  const app  = document.getElementById('app');
  if(lock) lock.style.display = 'none';
  if(app)  app.style.display = '';
  if(typeof arrancarApp === 'function') arrancarApp(rol);
  else SESION_PENDIENTE = rol;
}

async function verificarAcceso(){
  const usuario  = document.getElementById('loginUsuario').value;
  const password = document.getElementById('loginPassword').value;
  const errDiv   = document.getElementById('accessError');
  errDiv.style.display = 'none';
  if(!usuario){ errDiv.textContent = 'Selecciona tu empresa primero.'; errDiv.style.display = 'block'; return; }

  if(firebaseReady && USUARIOS[usuario]){
    errDiv.style.display = 'none';
    try{
      await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
      await auth.signInWithEmailAndPassword(USUARIOS[usuario].email, password);
      /* onAuthStateChanged abre la app */
    }catch(e){
      const malas = ['auth/invalid-credential','auth/wrong-password','auth/user-not-found','auth/invalid-email'];
      errDiv.textContent = malas.indexOf(e.code) > -1
        ? 'Usuario o contraseña incorrectos. Intenta nuevamente.'
        : 'No se pudo iniciar sesión (' + (e.code || e.message) + ').';
      errDiv.style.display = 'block';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
    }
    return;
  }

  const cred = CREDENCIALES_LOCAL[usuario];
  if(cred && password === cred.pass){
    abrirApp(cred.rol);
  }else{
    errDiv.textContent = 'Usuario o contraseña incorrectos. Intenta nuevamente.';
    errDiv.style.display = 'block';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').focus();
  }
}

if(firebaseReady){
  auth.onAuthStateChanged(function(user){
    if(!user) return;
    const correo = (user.email || '').toLowerCase();
    let rol = null;
    for(const k in USUARIOS){ if(USUARIOS[k].email.toLowerCase() === correo) rol = USUARIOS[k].rol; }
    abrirApp(rol || localStorage.getItem('grifos_role') || 'singemelec');
  });
}
</script>

/* ====================================================================
   BASE DE DATOS COMPARTIDA
   - Firestore: UN DOCUMENTO POR HALLAZGO en la colección 'hallazgos'
     (antes iba todo en un solo documento y reventaba el límite de 1 MB).
   - Firebase Storage: las fotos se suben como archivo .jpg y en la base
     de datos solo se guarda su URL.
   - Sin Firebase configurado, todo cae a localStorage (modo local).
   ==================================================================== */
const COLECCION = 'hallazgos';
const LOCAL_KEY = 'grifos_hallazgos_local';
const MAX_LADO_FOTO = 1000;      // px, lado mayor
const CALIDAD_FOTO  = 0.62;      // calidad JPEG inicial
const MAX_BYTES_FOTO = 190000;   // ~190 KB por foto (3 fotos < 1 MB del documento)

function cargarLocal(){
  try{
    const local = localStorage.getItem(LOCAL_KEY);
    HALLAZGOS = local ? JSON.parse(local) : [];
  }catch(e){ HALLAZGOS = []; }
}
function guardarLocal(){
  try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(HALLAZGOS)); }
  catch(e){ toast('No hay espacio para guardar localmente. Configura Firebase.'); console.error(e); }
}
function ordenarHallazgos(){
  HALLAZGOS.sort((a,b)=> String(b.fecha_creacion||'').localeCompare(String(a.fecha_creacion||'')));
}
function modoLocal(msg){
  STORAGE_MODE = 'local';
  if(msg) toast(msg);
  const foot = document.getElementById('railFoot');
  if(foot) foot.innerHTML = '⚠ modo local<br>los datos no se están<br>compartiendo';
}

function suscribirHallazgos(onChange){
  if(!firebaseReady){
    cargarLocal();
    onChange();
    return;
  }
  db.collection(COLECCION).onSnapshot(
    (snap)=>{
      HALLAZGOS = snap.docs.map(d=> Object.assign({id:d.id}, d.data()));
      ordenarHallazgos();
      STORAGE_MODE = 'remote';
      onChange();
    },
    (err)=>{
      console.error(err);
      modoLocal('Sin acceso a la base compartida: mostrando datos locales');
      cargarLocal();
      onChange();
    }
  );
}

/* Guarda/actualiza UN hallazgo */
async function persistirHallazgo(h){
  if(STORAGE_MODE === 'remote' && firebaseReady){
    try{
      const data = Object.assign({}, h);
      delete data.id;
      if(JSON.stringify(data).length > 1000000){
        toast('El hallazgo es demasiado pesado (fotos). Vuelve a tomarlas con menos detalle.');
        return false;
      }
      data.actualizado = new Date().toISOString();
      await db.collection(COLECCION).doc(h.id).set(data, {merge:true});
      return true;   // el listener en tiempo real refresca a ambas empresas
    }catch(e){
      console.error(e);
      modoLocal('Sin conexión a la base compartida: guardando solo en este dispositivo');
    }
  }
  const i = HALLAZGOS.findIndex(x=>x.id===h.id);
  if(i === -1) HALLAZGOS.unshift(h); else HALLAZGOS[i] = h;
  ordenarHallazgos();
  guardarLocal();
  render();
  return false;
}

/* Guarda varios (importación CSV) */
async function persistirVarios(arr){
  if(!arr.length) return;
  if(STORAGE_MODE === 'remote' && firebaseReady){
    try{
      for(let i=0; i<arr.length; i+=400){
        const chunk = arr.slice(i, i+400);
        const batch = db.batch();
        chunk.forEach(h=>{
          const data = Object.assign({}, h);
          delete data.id;
          batch.set(db.collection(COLECCION).doc(h.id), data);
        });
        await batch.commit();
      }
      return;
    }catch(e){
      console.error(e);
      modoLocal('Sin conexión a la base compartida: importando solo en este dispositivo');
    }
  }
  arr.forEach(h=>HALLAZGOS.unshift(h));
  ordenarHallazgos();
  guardarLocal();
  render();
}

/* Compatibilidad con llamadas antiguas */
async function saveHallazgos(){ guardarLocal(); render(); }

/* ---------------- FOTOS ---------------- */
/* Las fotos se guardan comprimidas dentro del documento del hallazgo
   (plan gratuito de Firebase, sin necesidad de Storage ni tarjeta).
   Se reducen a MAX_LADO_FOTO px y se baja la calidad hasta quedar
   por debajo de MAX_BYTES_FOTO, con la fecha/hora estampada. */
function procesarImagen(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = function(e){
      const img = new Image();
      img.onerror = reject;
      img.onload = function(){
        let w = img.width, h = img.height;
        const escala = Math.min(1, MAX_LADO_FOTO / Math.max(w, h));
        w = Math.round(w * escala); h = Math.round(h * escala);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        const stamp = fmtDate(new Date());
        const fontSize = Math.max(13, Math.round(w/32));
        ctx.font = `600 ${fontSize}px IBM Plex Mono, monospace`;
        const padding = fontSize*0.6;
        const textW = ctx.measureText(stamp).width;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, h-fontSize-padding*2, textW+padding*2, fontSize+padding*2);
        ctx.fillStyle = '#fff';
        ctx.textBaseline = 'middle';
        ctx.fillText(stamp, padding, h-fontSize/2-padding);

        let q = CALIDAD_FOTO;
        let dataUrl = canvas.toDataURL('image/jpeg', q);
        while(dataUrl.length > MAX_BYTES_FOTO && q > 0.28){
          q -= 0.08;
          dataUrl = canvas.toDataURL('image/jpeg', q);
        }
        resolve({dataUrl: dataUrl, bytes: dataUrl.length});
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

          <span><i style="background:var(--senal)"></i>Operat. indirecta / Mecánica</span>
          <span><i style="background:var(--tuberia)"></i>Señalética / Visibilidad</span>
        </div>
      </div>
      <div>
        <div class="panel">
          <h3>Hallazgos por prioridad</h3>
          <div class="chart-wrap"><canvas id="chartPrioridad"></canvas></div>
        </div>
        <div class="panel">
          <h3>Avance de resolución</h3>
          <div class="chart-wrap"><canvas id="chartEstado"></canvas></div>
        </div>
      </div>
    </div>
  </div>`;

  // Map
  if(dashMapInstance){ dashMapInstance.remove(); dashMapInstance=null; }
  const defaultCenter = [-33.25, -70.70]; // zona de servicio: Lampa · Colina · Santiago (RM)
  const center = HALLAZGOS.length ? [HALLAZGOS[0].lat, HALLAZGOS[0].lng] : defaultCenter;
  dashMapInstance = L.map('dashMap').setView(center, HALLAZGOS.length?12:10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(dashMapInstance);
  // Capa base: todos los grifos del catálogo (gris/pequeños)
  CATALOGO_GRIFOS.forEach(g=>{
    if(!g.lat || !g.lng) return;
    L.circleMarker([g.lat,g.lng],{radius:4,color:'#7a8fa0',weight:1,fillColor:'#b0c4ce',fillOpacity:0.7})
      .addTo(dashMapInstance)
      .bindPopup(`<span style="font-family:monospace;font-size:11px">${g.codigoGrifo}</span><br>${g.Ubicacion||''}<br><small>${g.empresa} · ${g.comuna||''}</small>`);
  });
  // Capa de hallazgos (encima, coloreados por prioridad)
  HALLAZGOS.forEach(h=>{
    const color = PRIORIDAD_COLOR[h.prioridad] || '#999';
    const marker = L.circleMarker([h.lat,h.lng],{radius:10,color:'#fff',weight:2.5,fillColor:color,fillOpacity:1}).addTo(dashMapInstance);
    marker.bindPopup(`<strong>${h.codigoGrifo||''} ${h.direccion||'Sin dirección'}</strong><br>${PRIORIDAD_LABEL[h.prioridad]} · ${ESTADO_LABEL[h.estado]}<br><small>${h.empresa||''} · ${h.comuna||''}</small><br><span style="font-family:monospace;font-size:10px">${h.id}</span>`);
  });

  // Charts
  if(dashChart1) dashChart1.destroy();
  if(dashChart2) dashChart2.destroy();
  dashChart1 = new Chart(document.getElementById('chartPrioridad'), {
    type:'doughnut',
    data:{labels:['Operatividad directa','Operat. indirecta / Mecánica','Señalética / Visibilidad'],
      datasets:[{data:[counts.inmediato||0,counts.corto||0,counts.mediano||0],
      backgroundColor:['#C8334D','#E2A33D','#3B6E8F'],borderWidth:2,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},cutout:'62%',maintainAspectRatio:false}
  });
  dashChart2 = new Chart(document.getElementById('chartEstado'), {
    type:'bar',
    data:{labels:['Pendiente','En proceso','Resuelto'],
      datasets:[{data:[estados.pendiente||0,estados.en_proceso||0,estados.resuelto||0],
      backgroundColor:['#cabfa1','#7fa688','#5C8A60'],borderRadius:6}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}},maintainAspectRatio:false}
  });
}

/* ---------------- TIPOS DE HALLAZGO ---------------- */
const TIPOS_HALLAZGO = {
  camara: [
    'Cámara en mal estado',
    'Tapa de cámara en mal estado',
    'Cámara con suciedad',
    'Cámara inundada',
    'Cámara no ubicable'
  ],
  grifo: [
    'Vástago en mal estado',
    'Pérdida de agua',
    'Boquilla en mal estado',
    'Robo de agua'
  ]
};
const CATEGORIA_LABEL = { camara: 'Cámara', grifo: 'Grifo' };

function actualizarSubtipos(){
  const cat = document.getElementById('fCategoria').value;
  const sel = document.getElementById('fTipoHallazgo');
  if(!cat){
    sel.innerHTML = '<option value="">— Selecciona primero la categoría —</option>';
    return;
  }
  const opciones = TIPOS_HALLAZGO[cat] || [];
  sel.innerHTML = '<option value="">— Selecciona tipo de hallazgo —</option>' +
    opciones.map(o=>`<option value="${o}">${o}</option>`).join('');
}

let grifoSeleccionado = null;
function seleccionarGrifo(codigo){
  const g = CATALOGO_GRIFOS.find(x=>x.codigoGrifo===codigo);
  if(!g) return;
  grifoSeleccionado = g;
  document.getElementById('fCodigoGrifo').value = g.codigoGrifo;
  document.getElementById('grifoSuggestions').innerHTML = '';
  // Autocompletar dirección
  if(g.Ubicacion) document.getElementById('fDireccion').value = g.Ubicacion;
  // Centrar mapa y marcar posición
  if(g.lat && g.lng && formMap){
    if(formMarkerActual) formMap.removeLayer(formMarkerActual);
    formMarkerActual = L.circleMarker([g.lat, g.lng],{radius:9,color:'#fff',weight:2,fillColor:'#C8334D',fillOpacity:1}).addTo(formMap);
    formMarkerActual.bindTooltip(g.codigoGrifo).openTooltip();
    formMap.setView([g.lat, g.lng], 17);
    updateCoordsInfo();
  }
  // Mostrar info del grifo
  const info = document.getElementById('grifoInfo');
  const zonaTag = g.ZonaRiesgo==1 ? '<span class="badge inmediato">Zona riesgo</span>' : '';
  const fugaTag = g.FugaAgua==1 ? '<span class="badge corto">Con fuga</span>' : '';
  info.style.display = 'block';
  info.innerHTML = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
      <strong class="mono">${g.codigoGrifo}</strong>
      <span class="badge mediano">${g.empresa}</span>
      <span class="badge mediano">${g.comuna||''}</span>
      ${zonaTag}${fugaTag}
    </div>
    <div style="color:var(--text-soft);line-height:1.6;">
      Modelo: <b>${g.Modelo||'—'}</b> · Diám: <b>${g.DiametroNominal||'—'} mm</b> · Presión: <b>${g.Presion||'—'} mca</b><br>
      Última inspección: <b>${g.fechaInspeccion||'—'}</b> · Año instalación: <b>${g.AnioInstalacion||'—'}</b>
    </div>`;
}

function updateCoordsInfo(){
  let txt = '';
  if(formMarkerActual){ const ll=formMarkerActual.getLatLng(); txt += `Grifo: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}  `; }
  if(formMarkerIdeal){ const ll=formMarkerIdeal.getLatLng(); txt += `Ideal: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}`; }
  document.getElementById('coordsInfo').textContent = txt;
}

async function searchAddress(q){
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&countrycodes=cl&viewbox=-70.95,-33.10,-70.45,-33.42&bounded=0&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const box = document.getElementById('addrSuggestions');
    box.innerHTML = `<div style="position:absolute;z-index:500;background:#fff;border:1px solid var(--line);border-radius:6px;width:100%;max-height:180px;overflow-y:auto;box-shadow:0 6px 14px rgba(0,0,0,.1);">${
      data.map(d=>`<div style="padding:8px 10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--line);" onmousedown="selectAddress(${d.lat},${d.lon},'${(d.display_name||'').replace(/'/g,"\\'")}')">${d.display_name}</div>`).join('')
    }</div>`;
  }catch(e){ /* silent */ }
}
function selectAddress(lat, lon, label){
  document.getElementById('fDireccion').value = label;
  document.getElementById('addrSuggestions').innerHTML = '';
  if(formMarkerActual) formMap.removeLayer(formMarkerActual);
  formMarkerActual = L.circleMarker([lat,lon],{radius:8,color:'#fff',weight:2,fillColor:'#C8334D',fillOpacity:1}).addTo(formMap);
  formMap.setView([lat,lon], 16);
  updateCoordsInfo();
}
async function reverseGeocode(lat,lng){
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    const data = await res.json();
    if(data && data.display_name) document.getElementById('fDireccion').value = data.display_name;
  }catch(e){}
}
function useGPS(){
  if(!navigator.geolocation){ toast('GPS no disponible en este dispositivo'); return; }
  navigator.geolocation.getCurrentPosition((pos)=>{
    const {latitude, longitude} = pos.coords;
    if(formMarkerActual) formMap.removeLayer(formMarkerActual);
    formMarkerActual = L.circleMarker([latitude,longitude],{radius:8,color:'#fff',weight:2,fillColor:'#C8334D',fillOpacity:1}).addTo(formMap);
    formMap.setView([latitude,longitude],16);
    reverseGeocode(latitude,longitude);
    updateCoordsInfo();
    toast('Ubicación GPS capturada');
  }, ()=>toast('No se pudo obtener la ubicación GPS'));
}

async function handlePhoto(evt, tipo){
  const file = evt.target.files[0];
  if(!file) return;
  const box = document.getElementById(tipo==='grifo'?'boxGrifo':'boxHallazgo');
  if(box) box.innerHTML = '<span>Procesando foto…</span>';
  try{
    const res = await procesarImagen(file);
    pendingFotos[tipo] = res;
    if(box) box.innerHTML = `<img src="${res.dataUrl}">`;
  }catch(e){
    console.error(e);
    toast('No se pudo procesar la fotografía');
    if(box) box.innerHTML = '<span>Toca para tomar / subir foto</span>';
  }
}

async function guardarHallazgo(){
  if(!formMarkerActual){ toast('Selecciona el grifo del catálogo o marca su ubicación en el mapa'); return; }
  const categoria = document.getElementById('fCategoria').value;
  const tipoHallazgo = document.getElementById('fTipoHallazgo').value;
  if(!categoria){ toast('Selecciona la categoría del hallazgo'); return; }
  if(!tipoHallazgo){ toast('Selecciona el tipo de hallazgo'); return; }
  const prioridad = document.querySelector('input[name="prioridad"]:checked').value;
  const llActual = formMarkerActual.getLatLng();
  const llIdeal = formMarkerIdeal ? formMarkerIdeal.getLatLng() : null;

  const btn = document.getElementById('btnGuardarHallazgo');
  if(btn){ btn.disabled = true; btn.textContent = 'Guardando…'; }

  const id = uid();
  const fotoGrifo    = pendingFotos.grifo    ? pendingFotos.grifo.dataUrl    : null;
  const fotoHallazgo = pendingFotos.hallazgo ? pendingFotos.hallazgo.dataUrl : null;

  const nuevo = {
    id: id,
    fecha_creacion: new Date().toISOString(),
    creado_por: 'Singemelec',
    codigoGrifo: grifoSeleccionado ? grifoSeleccionado.codigoGrifo : null,
    empresa: grifoSeleccionado ? grifoSeleccionado.empresa : null,
    modelo: grifoSeleccionado ? grifoSeleccionado.Modelo : null,
    comuna: grifoSeleccionado ? grifoSeleccionado.comuna : null,
    zona_riesgo: grifoSeleccionado ? grifoSeleccionado.ZonaRiesgo : null,
    presion: grifoSeleccionado ? grifoSeleccionado.Presion : null,
    categoria,
    tipo_hallazgo: tipoHallazgo,
    direccion: document.getElementById('fDireccion').value || 'Sin dirección registrada',
    lat: llActual.lat, lng: llActual.lng,
    ideal_lat: llIdeal? llIdeal.lat : null, ideal_lng: llIdeal? llIdeal.lng : null,
    foto_grifo: fotoGrifo,
    foto_hallazgo: fotoHallazgo,
    foto_respaldo: null,
    descripcion: document.getElementById('fDescripcion').value,
    prioridad,
    estado: 'pendiente',
    comentarios: []
  };

  await persistirHallazgo(nuevo);
  pendingFotos = {grifo:null, hallazgo:null};
  grifoSeleccionado = null;
  if(btn){ btn.disabled = false; btn.textContent = 'Guardar hallazgo'; }
  toast('Hallazgo guardado correctamente');
  goPage('lista');
}

function closeModal(){ const m = document.getElementById('modalBg'); if(m) m.classList.remove('open'); }

let pendingRespaldo = null;
async function handlePhotoRespaldo(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const box = document.getElementById('boxRespaldo');
  if(box) box.innerHTML = '<span>Procesando foto…</span>';
  try{
    const res = await procesarImagen(file);
    pendingRespaldo = res;
    if(box) box.innerHTML = `<img src="${res.dataUrl}">`;
  }catch(e){
    console.error(e);
    toast('No se pudo procesar la fotografía');
    if(box) box.innerHTML = '<span>Toca para tomar / subir foto de respaldo</span>';
  }
}

async function actualizarHallazgo(id){
  const h = HALLAZGOS.find(x=>x.id===id);
  if(!h) return;
  const btn = document.getElementById('btnActualizar');
  if(btn){ btn.disabled = true; btn.textContent = 'Guardando…'; }

  h.estado = document.getElementById('estadoSelect').value;

  if(pendingRespaldo) h.foto_respaldo = pendingRespaldo.dataUrl;

  const txt = document.getElementById('nuevoComentario').value.trim();
  if(txt){
    if(!Array.isArray(h.comentarios)) h.comentarios = [];
    h.comentarios.push({autor: ROLE==='sacyr' ? 'Sacyr Aguas' : 'Singemelec', fecha:new Date().toISOString(), texto:txt});
  }

  await persistirHallazgo(h);
  pendingRespaldo = null;
  if(btn){ btn.disabled = false; btn.textContent = 'Guardar actualización'; }
  toast('Actualización guardada');
  closeModal();
  render();
}

  const fechaReporte = fmtDate(new Date());
  const pctResuelto = total ? Math.round((estados.resuelto||0)/total*100) : 0;
  const dataJson = JSON.stringify(HALLAZGOS).replace(/</g,'\\u003c');

  // Análisis por comuna
  const porComuna = {};
  HALLAZGOS.forEach(h=>{
    const c = h.comuna || 'Sin datos';

    porComuna[c].total++;
    porComuna[c][h.prioridad]=(porComuna[c][h.prioridad]||0)+1;
    if(h.zona_riesgo==1) porComuna[c].zona_riesgo++;
  });
  const filasComuna = Object.entries(porComuna).sort((a,b)=>b[1].inmediato-a[1].inmediato).map(([c,v])=>`
    <tr>

/* ---------------- IMPORTAR CSV ---------------- */
function handleCSVImport(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    const text = e.target.result;
    const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
    if(lines.length<2){ toast('El archivo CSV está vacío'); return; }
    const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
    const idx = {
      direccion: headers.indexOf('direccion'),
      lat: headers.indexOf('lat'),
      lng: headers.indexOf('lng'),
      prioridad: headers.indexOf('prioridad'),
      estado: headers.indexOf('estado'),
      descripcion: headers.indexOf('descripcion')
    };
    if(idx.lat===-1 || idx.lng===-1){
      toast('El CSV debe tener al menos columnas: direccion, lat, lng');
      return;
    }
    let importados = 0;
    const nuevos = [];
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(',');
      const lat = parseFloat(cols[idx.lat]);
      const lng = parseFloat(cols[idx.lng]);
      if(isNaN(lat) || isNaN(lng)) continue;
      const prioridadRaw = (idx.prioridad>-1 ? cols[idx.prioridad] : '').trim().toLowerCase();
      const prioridad = ['inmediato','corto','mediano'].includes(prioridadRaw) ? prioridadRaw : 'mediano';
      const estadoRaw = (idx.estado>-1 ? cols[idx.estado] : '').trim().toLowerCase();
      const estado = ['pendiente','en_proceso','resuelto'].includes(estadoRaw) ? estadoRaw : 'pendiente';
      nuevos.push({
        id: uid(),
        fecha_creacion: new Date().toISOString(),
        creado_por: 'Importado (base de datos)',
        direccion: idx.direccion>-1 ? (cols[idx.direccion]||'').trim() : `Grifo ${lat.toFixed(4)}, ${lng.toFixed(4)}`,
        lat, lng, ideal_lat:null, ideal_lng:null,
        foto_grifo:null, foto_hallazgo:null, foto_respaldo:null,
        descripcion: idx.descripcion>-1 ? (cols[idx.descripcion]||'').trim() : '',
        prioridad, estado, comentarios:[]
      });
      importados++;
    }
    await persistirVarios(nuevos);
    toast(`${importados} grifos importados correctamente`);
    evt.target.value = '';
    renderDashboard();
  };
  reader.readAsText(file);
}
